name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  IMAGE_NAME: cloudcli-ui

jobs:
  # ─── Stage 1: Code Quality ────────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ─── Stage 2a: Unit Tests ─────────────────────────────────
  unit-test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  # ─── Stage 2b: E2E Tests (push only — PRs skip for speed) ──
  e2e-test:
    needs: lint-and-typecheck
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Start server
        run: node dist-server/server/index.js &
        env:
          SERVER_PORT: 3001
          HOST: 127.0.0.1
          NODE_ENV: test
          LOG_LEVEL: warn

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3001/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          TEST_BASE_URL: http://127.0.0.1:3001

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ─── Stage 3: Docker Build & Push to ACR ──────────────────
  docker-build-push:
    needs: [unit-test, e2e-test]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && !cancelled() && needs.unit-test.result == 'success' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      deploy-env: ${{ steps.meta.outputs.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | head -c 7)
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
            echo "tag=prod-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          else
            echo "env=staging" >> "$GITHUB_OUTPUT"
            echo "tag=staging-${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Build Docker image
        run: |
          echo "=== Dockerfile check ==="
          head -5 Dockerfile
          echo "=== Building ==="
          docker build \
            --tag ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ steps.meta.outputs.env }} \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Generate build size report from Docker image
        run: |
          npm ci
          # Extract the built dist from the Docker image rather than rebuilding
          CONTAINER_ID=$(docker create ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }})
          docker cp "$CONTAINER_ID:/app/dist" ./dist
          docker cp "$CONTAINER_ID:/app/dist-server" ./dist-server
          docker rm "$CONTAINER_ID"
          npm run build:size-report

      - name: Upload build size report
        uses: actions/upload-artifact@v4
        with:
          name: build-size-report
          path: build-size-report.json
          retention-days: 30

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest-${{ steps.meta.outputs.env }}

  # ─── Stage 4: Deploy to ECS ───────────────────────────────
  deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: ${{ needs.docker-build-push.outputs.deploy-env }}
    steps:
      - name: Resolve ECS host
        id: host
        run: |
          if [[ "${{ needs.docker-build-push.outputs.deploy-env }}" == "production" ]]; then
            echo "ecs_host=${{ secrets.ECS_HOST_PRODUCTION }}" >> "$GITHUB_OUTPUT"
          else
            echo "ecs_host=${{ secrets.ECS_HOST_STAGING }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.host.outputs.ecs_host }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_ENV="${{ needs.docker-build-push.outputs.deploy-env }}"
            IMAGE="${{ secrets.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-build-push.outputs.image-tag }}"
            STAGING_TEST_USER="${{ secrets.STAGING_TEST_USER }}"
            STAGING_TEST_PASS="${{ secrets.STAGING_TEST_PASS }}"

            # Environment-specific configuration
            if [ "$DEPLOY_ENV" = "staging" ]; then
              CONTAINER_NAME="cloudcli-ui-staging"
              HOST_PORT=3002
              DATA_DIR="/opt/cloudcli/data-staging"
              ENV_FILE="/opt/cloudcli/.env.staging"
            else
              CONTAINER_NAME="cloudcli-ui"
              HOST_PORT=3001
              DATA_DIR="/opt/cloudcli/data"
              ENV_FILE="/opt/cloudcli/.env"
            fi

            echo "[Deploy] Environment: $DEPLOY_ENV"
            echo "[Deploy] Container: $CONTAINER_NAME, Port: $HOST_PORT"

            echo "[Deploy] Cleaning up old Docker resources..."
            docker image prune -af --filter "until=72h" || true
            docker builder prune -af || true

            echo "[Deploy] Pulling image: $IMAGE"
            docker pull "$IMAGE"

            echo "[Deploy] Stopping old container..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            echo "[Deploy] Starting new container..."
            mkdir -p "$DATA_DIR"
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$HOST_PORT":3001 \
              -v "$DATA_DIR":/data \
              --env-file "$ENV_FILE" \
              "$IMAGE"

            echo "[Deploy] Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf "http://localhost:$HOST_PORT/health" > /dev/null 2>&1; then
                echo "[Deploy] Health check passed!"

                # Staging: setup/update nginx reverse proxy
                if [ "$DEPLOY_ENV" = "staging" ]; then
                  mkdir -p /tmp/nginx_proxy && chmod 777 /tmp/nginx_proxy
                  echo "[Deploy] Writing staging nginx config (8089 HTTP + 8444 HTTPS)..."
                  cat > /etc/nginx/sites-available/cloudcli-staging << 'NGINX_CONF'
            server {
                listen 8089;
                server_name _;
                client_max_body_size 50M;
                location / {
                    proxy_pass http://127.0.0.1:3002;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 86400;
                    proxy_send_timeout 86400;
                    proxy_buffering on;
                    proxy_buffer_size 128k;
                    proxy_buffers 8 256k;
                    proxy_busy_buffers_size 512k;
                    proxy_temp_path /tmp/nginx_proxy;
                    proxy_max_temp_file_size 1024m;
                }
            }
            server {
                listen 8444 ssl;
                server_name _;
                ssl_certificate /etc/nginx/ssl/cloudcli.crt;
                ssl_certificate_key /etc/nginx/ssl/cloudcli.key;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_ciphers HIGH:!aNULL:!MD5;
                client_max_body_size 50M;
                location / {
                    proxy_pass http://127.0.0.1:3002;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto https;
                    proxy_read_timeout 86400;
                    proxy_send_timeout 86400;
                    proxy_buffering on;
                    proxy_buffer_size 128k;
                    proxy_buffers 8 256k;
                    proxy_busy_buffers_size 512k;
                    proxy_temp_path /tmp/nginx_proxy;
                    proxy_max_temp_file_size 1024m;
                }
            }
            NGINX_CONF
                  ln -sf /etc/nginx/sites-available/cloudcli-staging /etc/nginx/sites-enabled/cloudcli-staging
                  if nginx -t 2>/dev/null; then
                    nginx -s reload
                    echo "[Deploy] Nginx staging config created and reloaded."
                  else
                    echo "[Deploy] WARNING: Nginx config test failed, skipping reload."
                    rm -f /etc/nginx/sites-available/cloudcli-staging /etc/nginx/sites-enabled/cloudcli-staging
                  fi
                fi

                # Staging: auto-register test account (safe to retry — 403 if user exists)
                if [ "$DEPLOY_ENV" = "staging" ]; then
                  echo "[Deploy] Registering staging test account..."
                  curl -sf -X POST "http://localhost:$HOST_PORT/api/auth/register" \
                    -H 'Content-Type: application/json' \
                    -d "{\"username\":\"$STAGING_TEST_USER\",\"password\":\"$STAGING_TEST_PASS\"}" || echo "[Deploy] Test account already exists, skipping."

                  echo "[Deploy] Auto-completing onboarding for staging test user..."
                  sqlite3 "$DATA_DIR/auth.db" \
                    "UPDATE users SET git_name='staging-test', git_email='staging@test.local', has_completed_onboarding=1 WHERE username='$STAGING_TEST_USER';" \
                    || echo "[Deploy] Onboarding auto-complete failed, skipping."
                fi

                exit 0
              fi
              echo "[Deploy] Waiting... ($i/15)"
              sleep 3
            done

            echo "[Deploy] Health check failed!"
            docker logs "$CONTAINER_NAME" --tail 50
            exit 1

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Environment** | ${{ needs.docker-build-push.outputs.deploy-env }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image Tag** | ${{ needs.docker-build-push.outputs.image-tag }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Triggered by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Timestamp** | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> "$GITHUB_STEP_SUMMARY"
